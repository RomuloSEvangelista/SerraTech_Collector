<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Serratec Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1a1a2e 0%, #000000 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
        }
        .hero-title { font-family: 'Cinzel', serif; color: #f1c40f; text-shadow: 0 0 15px rgba(241,196,15,0.4); }
        .card-admin {
            background: rgba(20,20,20,0.85);
            border: 1px solid rgba(241,196,15,0.25) !important;
            transition: 0.3s;
        }
        .card-admin:hover { border-color: #f1c40f !important; box-shadow: 0 0 16px rgba(241,196,15,0.2); }
        .form-control, .form-control:focus {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            color: white !important;
            box-shadow: none !important;
        }
        .form-label { color: #f1c40f; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; }
        .btn-gold { background: #f1c40f; color: black; font-weight: bold; border: none; transition: 0.3s; }
        .btn-gold:hover { background: #ffda44; box-shadow: 0 0 12px rgba(241,196,15,0.4); }
        .badge-id { background: rgba(241,196,15,0.15); color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; }
        .card-thumb { width: 60px; height: 80px; object-fit: contain; border-radius: 6px; background: #0d0d0d; padding: 4px; }
        .status-msg { font-size: 0.8rem; min-height: 20px; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(20,20,20,0.9); border: 1px solid rgba(241,196,15,0.3); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; }
        #admin-screen { display: none; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN ADMIN -->
    <div id="login-screen">
        <div class="login-card text-center">
            <h2 class="hero-title mb-1">ADMIN</h2>
            <p class="text-white-50 small mb-4">Painel de controle do Grimório</p>
            <div class="mb-3 text-start">
                <label class="form-label">Senha de Administrador</label>
                <input type="password" id="adminSenha" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn btn-gold w-100" onclick="entrarAdmin()">ENTRAR</button>
            <p id="login-erro" class="text-danger mt-2 small" style="min-height:20px;"></p>
        </div>
    </div>

    <!-- PAINEL ADMIN -->
    <div id="admin-screen">
        <nav class="navbar navbar-dark bg-black border-bottom border-secondary mb-5">
            <div class="container">
                <span class="navbar-brand hero-title fs-4">ADMIN — Grimório</span>
                <div class="d-flex gap-2">
                    <a href="../index.html" class="btn btn-outline-light btn-sm">Ver Site</a>
                    <button onclick="sairAdmin()" class="btn btn-outline-danger btn-sm">Sair</button>
                </div>
            </div>
        </nav>

        <div class="container pb-5">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h1 class="hero-title mb-0" style="font-size:1.8rem;">Gerenciar Cartas</h1>
                    <p class="text-white-50 small mb-0">Edite nome, descrição e valor direto na API</p>
                </div>
                <button class="btn btn-outline-warning btn-sm" onclick="carregarCards()">↻ Recarregar</button>
            </div>

            <div id="loading" class="text-center py-5 text-white-50">Carregando cartas da API...</div>
            <div id="cards-admin" class="row g-4" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://69f60881a72f01a951b91cd8.mockapi.io/cards";
        const ADMIN_SENHA = "admin123"; // Troque para a senha que quiser

        // ==========================================
        // --- LOGIN ADMIN ---
        // ==========================================
        function entrarAdmin() {
            const senha = document.getElementById('adminSenha').value;
            if (senha === ADMIN_SENHA) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-screen').style.display = 'block';
                carregarCards();
            } else {
                document.getElementById('login-erro').textContent = "Senha incorreta!";
            }
        }

        // Enter para logar
        document.getElementById('adminSenha').addEventListener('keydown', e => {
            if (e.key === 'Enter') entrarAdmin();
        });

        function sairAdmin() {
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('adminSenha').value = '';
            document.getElementById('login-erro').textContent = '';
        }

        // ==========================================
        // --- CARREGAR CARDS DA API ---
        // ==========================================
        async function carregarCards() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('cards-admin');

            loading.style.display = 'block';
            container.style.display = 'none';

            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Erro ao buscar cards");
                const cards = await res.json();

                container.innerHTML = "";

                cards.forEach(card => {
                    container.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card card-admin rounded-4 p-3">
                                <div class="d-flex align-items-center gap-3 mb-3">
                                    <img src="${card.img || card.imagem || ''}" 
                                         class="card-thumb"
                                         onerror="this.src='https://placehold.co/60x80?text=?'">
                                    <div>
                                        <span class="badge-id">ID: ${card.id}</span>
                                        <p class="mb-0 mt-1 fw-bold text-warning" style="font-size:0.9rem;">${card.nome || card.name || '—'}</p>
                                        <p class="mb-0 text-white-50" style="font-size:0.75rem;">${card.tipo || card.type || '—'}</p>
                                    </div>
                                </div>

                                <div class="mb-2">
                                    <label class="form-label">Nome</label>
                                    <input type="text" class="form-control form-control-sm" 
                                           id="nome_${card.id}" 
                                           value="${card.nome || card.name || ''}">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Descrição</label>
                                    <textarea class="form-control form-control-sm" rows="2"
                                              id="desc_${card.id}">${card.desc || card.descricao || ''}</textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Valor (R$)</label>
                                    <input type="number" step="0.01" min="0" class="form-control form-control-sm"
                                           id="price_${card.id}"
                                           value="${card.price || card.preco || 0}">
                                </div>

                                <button class="btn btn-gold w-100 btn-sm" onclick="salvarCard('${card.id}')">
                                    SALVAR ALTERAÇÕES
                                </button>
                                <p id="status_${card.id}" class="status-msg text-center mt-2"></p>
                            </div>
                        </div>
                    `;
                });

                loading.style.display = 'none';
                container.style.display = 'flex';

            } catch (err) {
                loading.textContent = "Erro ao carregar cards. Verifique a API.";
                console.error(err);
            }
        }

        // ==========================================
        // --- SALVAR CARD NA API (PUT) ---
        // ==========================================
        async function salvarCard(id) {
            const nome  = document.getElementById(`nome_${id}`).value.trim();
            const desc  = document.getElementById(`desc_${id}`).value.trim();
            const price = parseFloat(document.getElementById(`price_${id}`).value);
            const status = document.getElementById(`status_${id}`);

            if (!nome) { status.textContent = "⚠️ Nome não pode ser vazio."; status.className = "status-msg text-warning text-center mt-2"; return; }
            if (isNaN(price) || price < 0) { status.textContent = "⚠️ Valor inválido."; status.className = "status-msg text-warning text-center mt-2"; return; }

            status.textContent = "Salvando...";
            status.className = "status-msg text-white-50 text-center mt-2";

            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, name: nome, desc, descricao: desc, price, preco: price })
                });

                if (!res.ok) throw new Error("Erro ao salvar");

                status.textContent = "✓ Salvo com sucesso!";
                status.className = "status-msg text-success text-center mt-2";

                setTimeout(() => { status.textContent = ""; }, 3000);

            } catch (err) {
                status.textContent = "✗ Erro ao salvar.";
                status.className = "status-msg text-danger text-center mt-2";
                console.error(err);
            }
        }
    </script>
</body>
</html>
