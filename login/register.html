<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Card Collector TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle, #1a1a1a 0%, #000000 100%); color: white; min-height: 100vh; }
        .hero-title { font-family: 'Cinzel', serif; color: #f1c40f; }
        .card-auth { background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%); border: 1px solid rgba(241, 196, 15, 0.3); }
        .form-control { background-color: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; }
        .btn-outline-gold { border: 2px solid #f1c40f; color: #f1c40f; font-weight: bold; }
        .btn-outline-gold:hover { background: #f1c40f; color: black; }
    </style>
</head>
<body class="d-flex align-items-center">
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card card-auth shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h2 class="hero-title fw-bold">CADASTRO</h2>
                            <p class="text-white-50">Inicie sua jornada lendária</p>
                        </div>
                       
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">E-mail</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="seu@email.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Sua Senha</label>
                                <input type="password" class="form-control" id="regPassword" placeholder="Mínimo 6 dígitos" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Confirme a Senha</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Repita a senha" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-outline-gold btn-lg">CRIAR CONTA</button>
                                <a href="login.html" class="btn btn-link btn-sm text-white-50 mt-2">Já tenho uma conta</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/auth.js"></script>
</body>
</html>
